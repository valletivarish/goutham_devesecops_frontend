name: Frontend CD - Deploy to AWS S3

on:
  workflow_run:
    workflows: ["Frontend CI - Build & Security Scan"]
    types:
      - completed
    branches: [master, main]

jobs:
  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Node.js
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ------------------------------------------------------------------
      # 3. Install & Build
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_BASE_URL: http://${{ secrets.EC2_HOST }}:8080/api

      # ------------------------------------------------------------------
      # 4. Configure AWS Credentials
      # ------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ------------------------------------------------------------------
      # 5. Deploy to S3
      # ------------------------------------------------------------------
      - name: Sync build to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      # ------------------------------------------------------------------
      # 6. Verify Deployment
      # ------------------------------------------------------------------
      - name: Verify S3 website
        run: |
          WEBSITE_URL=$(aws s3api get-bucket-website --bucket ${{ secrets.S3_BUCKET_NAME }} 2>/dev/null && echo "Website hosting configured" || echo "Website hosting check completed")
          echo "Deployment complete to S3 bucket: ${{ secrets.S3_BUCKET_NAME }}"
