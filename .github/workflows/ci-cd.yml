name: Frontend CI/CD - Build, Security Scan & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-scan:
    name: Build, Lint & Security Analysis
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Node.js
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ------------------------------------------------------------------
      # 3. Install Dependencies
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      # ------------------------------------------------------------------
      # 4. ESLint Analysis
      # ------------------------------------------------------------------
      - name: Run ESLint
        run: npx eslint . --format json --output-file eslint-report.json || true

      - name: Upload ESLint Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-report
          path: eslint-report.json
          retention-days: 30

      # ------------------------------------------------------------------
      # 5. Build Production Bundle
      # ------------------------------------------------------------------
      - name: Build production bundle
        run: npm run build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: dist/
          retention-days: 30

      # ------------------------------------------------------------------
      # 6. npm audit - Dependency Vulnerability Scan
      # ------------------------------------------------------------------
      - name: Run npm audit
        run: npm audit --json > npm-audit-report.json || true

      - name: Upload npm audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit-report
          path: npm-audit-report.json
          retention-days: 30

      # ------------------------------------------------------------------
      # 7. Trivy Vulnerability Scan & SBOM
      # ------------------------------------------------------------------
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          output: 'trivy-results.txt'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Generate Trivy SBOM
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'cyclonedx'
          output: 'trivy-sbom.json'

      - name: Upload Trivy Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-results.txt
            trivy-sbom.json
          retention-days: 30

      # ------------------------------------------------------------------
      # 8. Gitleaks Secret Detection
      # ------------------------------------------------------------------
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Upload Gitleaks Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gitleaks-report
          path: results.sarif
          retention-days: 30

  deploy:
    name: Deploy to S3
    runs-on: ubuntu-latest
    needs: build-and-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Setup Node.js
      # ------------------------------------------------------------------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ------------------------------------------------------------------
      # 3. Install & Build
      # ------------------------------------------------------------------
      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npm run build
        env:
          VITE_API_URL: http://${{ secrets.EC2_HOST }}:8080/api

      # ------------------------------------------------------------------
      # 4. Configure AWS Credentials
      # ------------------------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # ------------------------------------------------------------------
      # 5. Deploy to S3
      # ------------------------------------------------------------------
      - name: Sync build to S3
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_NAME }} --delete

      # ------------------------------------------------------------------
      # 6. Verify Deployment
      # ------------------------------------------------------------------
      - name: Verify S3 website
        run: |
          WEBSITE_URL=$(aws s3api get-bucket-website --bucket ${{ secrets.S3_BUCKET_NAME }} 2>/dev/null && echo "Website hosting configured" || echo "Website hosting check completed")
          echo "Deployment complete to S3 bucket: ${{ secrets.S3_BUCKET_NAME }}"
